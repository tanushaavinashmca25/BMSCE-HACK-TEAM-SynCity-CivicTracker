services:
  - type: web
    name: civic-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOLO_SERVICE_URL
        sync: false
      - key: YOLO_SERVICE_TOKEN
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOW_ADMIN_WITHOUT_KEY
        value: false
      - key: PYTHON_VERSION
        value: 3.11.10
